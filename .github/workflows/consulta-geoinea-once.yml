name: Consulta GeoINEA temporária

on:
  push:
    branches:
      - main

permissions:
  contents: read
  statuses: write

jobs:
  consultar:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Testar coletor sem rede
        run: python -m unittest tests.test_coletar_geoinea_subbacia

      - name: Consultar camada oficial
        id: collect
        shell: bash
        run: |
          set +e
          status=1
          : > geoinea-query.log
          for attempt in 1 2 3; do
            echo "Tentativa ${attempt}/3" | tee -a geoinea-query.log
            rm -rf geoinea-result
            python scripts/coletar_geoinea_subbacia.py \
              --output-dir geoinea-result \
              --search-term Itapeba \
              --timeout 120 \
              >> geoinea-query.log 2>&1
            status=$?
            if [[ "$status" == "0" ]]; then
              break
            fi
            sleep $((attempt * 10))
          done
          cat geoinea-query.log
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Validar geometria retornada
        id: geometry_validation
        if: steps.collect.outputs.status == '0' && hashFiles('geoinea-result/matched-geometry.geojson') != ''
        shell: bash
        run: |
          set +e
          source_url=$(python - <<'PY'
          import json
          from pathlib import Path
          data = json.loads(Path('geoinea-result/query-manifest.json').read_text(encoding='utf-8'))
          print(data['query']['geometry_url'])
          PY
          )
          python scripts/validar_geojson_subbacia.py \
            --input geoinea-result/matched-geometry.geojson \
            --manifest geoinea-result/geometry-validation-manifest.json \
            --report geoinea-result/geometry-validation-report.md \
            --source-url "$source_url" \
            --accessed-at "$(date -u +%F)" \
            --source-srid EPSG:4674 \
            --expected-name Itapeba \
            > geoinea-geometry-validation.log 2>&1
          status=$?
          cat geoinea-geometry-validation.log
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Preservar consulta
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: geoinea-source-query
          path: |
            geoinea-result/
            geoinea-query.log
            geoinea-geometry-validation.log
          if-no-files-found: warn
          retention-days: 90

      - name: Registrar status
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          collect_status="${{ steps.collect.outputs.status }}"
          geometry_status="${{ steps.geometry_validation.outputs.status }}"
          if [[ "$collect_status" != "0" ]]; then
            state=failure
            description="Falha na consulta oficial do GeoINEA"
          elif [[ -n "$geometry_status" && "$geometry_status" != "0" ]]; then
            state=failure
            description="GeoJSON oficial retornado falhou na validação"
          else
            read -r objects matches geometry <<< "$(python - <<'PY'
          import json
          from pathlib import Path
          data = json.loads(Path('geoinea-result/query-manifest.json').read_text(encoding='utf-8'))
          result = data['result']
          print(result['object_id_count'], result['match_count'], 'sim' if result['geometry_downloaded'] else 'não')
          PY
          )"
            state=success
            description="GeoINEA: ${objects} objetos; ${matches} correspondências; geometria ${geometry}"
          fi
          gh api --method POST \
            "repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            -f state="$state" \
            -f context="geodata/source-query" \
            -f description="$description" \
            -f target_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
            > /dev/null || echo "::warning::Não foi possível registrar o status."

      - name: Interromper após falha
        if: steps.collect.outputs.status != '0' || (steps.geometry_validation.outputs.status != '' && steps.geometry_validation.outputs.status != '0')
        run: exit 1
