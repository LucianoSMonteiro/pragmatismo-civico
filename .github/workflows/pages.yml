name: Publicar portal

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write
  statuses: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      pages_enabled: ${{ steps.pages.outputs.enabled }}
    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Validar documentação
        id: validation
        shell: bash
        run: |
          set +e
          python scripts/generate_validation_report.py --output validation-report.md \
            > validation-output.log 2>&1
          status=$?
          cat validation-output.log
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Preservar relatório de validação
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-report
          path: |
            validation-report.md
            validation-output.log
          retention-days: 14

      - name: Registrar status da validação
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [[ "${{ steps.validation.outputs.status }}" == "0" ]]; then
            state=success
            description="Metadados, grafo, links, âncoras e evidências válidos"
          else
            state=failure
            description="Falha na validação documental"
          fi
          gh api --method POST \
            "repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            -f state="$state" \
            -f context="documentation/validation" \
            -f description="$description" \
            -f target_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
            > /dev/null || echo "::warning::Não foi possível registrar o status documental."

      - name: Interromper após falha documental
        if: steps.validation.outputs.status != '0'
        run: |
          cat validation-report.md
          exit 1

      - name: Testar pipeline de dados pluviométricos
        id: data_pipeline
        shell: bash
        run: |
          set +e
          python -m unittest discover -s tests -p 'test_processar_chuva_cemaden.py' \
            > data-pipeline-test.log 2>&1
          status=$?
          cat data-pipeline-test.log
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Preservar teste do pipeline de dados
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: data-pipeline-test
          path: data-pipeline-test.log
          retention-days: 14

      - name: Registrar status do pipeline de dados
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [[ "${{ steps.data_pipeline.outputs.status }}" == "0" ]]; then
            state=success
            description="Processador pluviométrico aprovado no teste sintético"
          else
            state=failure
            description="Falha no pipeline pluviométrico"
          fi
          gh api --method POST \
            "repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            -f state="$state" \
            -f context="data/pipeline" \
            -f description="$description" \
            -f target_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
            > /dev/null || echo "::warning::Não foi possível registrar o status do pipeline de dados."

      - name: Interromper após falha do pipeline de dados
        if: steps.data_pipeline.outputs.status != '0'
        run: exit 1

      - name: Testar pipeline geoespacial e registro técnico
        id: geodata_pipeline
        shell: bash
        run: |
          set +e
          python -m unittest discover -s tests -p 'test_validar_geojson_subbacia.py' \
            > geodata-pipeline-test.log 2>&1
          status=$?
          cat geodata-pipeline-test.log
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Preservar teste geoespacial e técnico
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: geodata-pipeline-test
          path: geodata-pipeline-test.log
          retention-days: 14

      - name: Registrar status geoespacial e técnico
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [[ "${{ steps.geodata_pipeline.outputs.status }}" == "0" ]]; then
            state=success
            description="Geometria, coleta e registro técnico aprovados"
          else
            state=failure
            description="Falha no pipeline geoespacial ou técnico"
          fi
          gh api --method POST \
            "repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            -f state="$state" \
            -f context="geodata/pipeline" \
            -f description="$description" \
            -f target_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
            > /dev/null || echo "::warning::Não foi possível registrar o status geoespacial."

      - name: Interromper após falha geoespacial ou técnica
        if: steps.geodata_pipeline.outputs.status != '0'
        run: exit 1

      - name: Analisar estrutura física do repositório
        run: python scripts/analyze_repository_structure.py --output structure-analysis.md

      - name: Preservar análise estrutural
        uses: actions/upload-artifact@v4
        with:
          name: structure-analysis
          path: structure-analysis.md
          retention-days: 14

      - name: Gerar prévia do catálogo documental
        run: python scripts/generate_catalog.py --output catalog-preview.md

      - name: Preservar prévia do catálogo
        uses: actions/upload-artifact@v4
        with:
          name: catalog-preview
          path: catalog-preview.md
          retention-days: 7

      - name: Sincronizar catálogo solicitado
        if: hashFiles('.github/catalog-sync-once') != ''
        shell: bash
        run: |
          cp catalog-preview.md CATALOGO_DOCUMENTAL.md
          rm .github/catalog-sync-once
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CATALOGO_DOCUMENTAL.md .github/catalog-sync-once
          git commit -m "docs: sincronizar catálogo gerado pela CI"
          git push origin HEAD:main

      - name: Verificar catálogo publicado
        id: catalog
        shell: bash
        run: |
          set +e
          diff -u CATALOGO_DOCUMENTAL.md catalog-preview.md > catalog-diff.log
          status=$?
          if [[ "$status" != "0" ]]; then
            cat catalog-diff.log
            echo "::error::O catálogo publicado diverge dos metadados ou da navegação. Regenere CATALOGO_DOCUMENTAL.md."
          fi
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Preservar diagnóstico do catálogo
        if: steps.catalog.outputs.status != '0'
        uses: actions/upload-artifact@v4
        with:
          name: catalog-diff
          path: catalog-diff.log
          retention-days: 7

      - name: Registrar status do catálogo
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [[ "${{ steps.catalog.outputs.status }}" == "0" ]]; then
            state=success
            description="Catálogo publicado sincronizado"
          elif [[ "${{ steps.validation.outputs.status }}" != "0" || "${{ steps.data_pipeline.outputs.status }}" != "0" || "${{ steps.geodata_pipeline.outputs.status }}" != "0" ]]; then
            state=error
            description="Catálogo não verificado por falha anterior"
          else
            state=failure
            description="Catálogo publicado divergente"
          fi
          gh api --method POST \
            "repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            -f state="$state" \
            -f context="documentation/catalog" \
            -f description="$description" \
            -f target_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
            > /dev/null || echo "::warning::Não foi possível registrar o status do catálogo."

      - name: Interromper após divergência do catálogo
        if: steps.catalog.outputs.status != '0'
        run: exit 1

      - name: Preparar acervo para publicação
        run: python scripts/prepare_mkdocs.py

      - name: Construir portal
        id: build
        shell: bash
        run: |
          set +e
          mkdocs build --strict --clean > mkdocs-build.log 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Preservar diagnóstico do build
        if: steps.build.outputs.status != '0'
        uses: actions/upload-artifact@v4
        with:
          name: mkdocs-build-log
          path: mkdocs-build.log
          retention-days: 7

      - name: Registrar status do build
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [[ "${{ steps.build.outputs.status }}" == "0" ]]; then
            state=success
            description="Portal compilado com mkdocs build --strict"
          elif [[ "${{ steps.validation.outputs.status }}" != "0" || "${{ steps.data_pipeline.outputs.status }}" != "0" || "${{ steps.geodata_pipeline.outputs.status }}" != "0" ]]; then
            state=error
            description="Build não executado por falha anterior"
          elif [[ "${{ steps.catalog.outputs.status }}" != "0" ]]; then
            state=error
            description="Build não executado por catálogo divergente"
          else
            state=failure
            description="Falha na compilação estrita do portal"
          fi
          gh api --method POST \
            "repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            -f state="$state" \
            -f context="portal/build" \
            -f description="$description" \
            -f target_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
            > /dev/null || echo "::warning::Não foi possível registrar o status explícito do build."

      - name: Interromper após falha do build
        if: steps.build.outputs.status != '0' && steps.validation.outputs.status == '0' && steps.data_pipeline.outputs.status == '0' && steps.geodata_pipeline.outputs.status == '0' && steps.catalog.outputs.status == '0'
        run: |
          cat mkdocs-build.log
          exit 1

      - name: Verificar disponibilidade do GitHub Pages
        id: pages
        if: steps.build.outputs.status == '0'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh api "repos/${GITHUB_REPOSITORY}/pages" > /dev/null 2>&1; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Build validado. A publicação será ativada automaticamente após o GitHub Pages ser habilitado para GitHub Actions nas configurações do repositório."
          fi

      - name: Configurar GitHub Pages
        if: steps.pages.outputs.enabled == 'true'
        uses: actions/configure-pages@v5

      - name: Enviar artefato do portal
        if: steps.build.outputs.status == '0'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    if: needs.build.outputs.pages_enabled == 'true'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Publicar no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
