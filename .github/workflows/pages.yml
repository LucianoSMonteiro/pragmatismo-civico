name: Publicar portal

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Preparar acervo para publicação
        run: python scripts/prepare_mkdocs.py

      - name: Construir portal
        id: build
        shell: bash
        run: |
          set +e
          mkdocs build --strict --clean > mkdocs-build.log 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Preservar diagnóstico do build
        if: steps.build.outputs.status != '0'
        uses: actions/upload-artifact@v4
        with:
          name: mkdocs-build-log
          path: mkdocs-build.log
          retention-days: 7

      - name: Interromper após falha do build
        if: steps.build.outputs.status != '0'
        run: |
          cat mkdocs-build.log
          exit 1

      - name: Configurar GitHub Pages
        if: steps.build.outputs.status == '0'
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Enviar artefato
        if: steps.build.outputs.status == '0'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Publicar no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
