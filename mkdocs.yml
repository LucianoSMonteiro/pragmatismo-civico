site_name: Pragmatismo Cívico
site_description: Framework aberto para decisões de interesse público baseadas em evidências
site_url: https://lucianosmonteiro.github.io/pragmatismo-civico/
repo_name: LucianoSMonteiro/pragmatismo-civico
repo_url: https://github.com/LucianoSMonteiro/pragmatismo-civico
edit_uri: edit/main/

docs_dir: .mkdocs-src
site_dir: site

copyright: Conteúdo aberto e versionado pela comunidade do Pragmatismo Cívico.

theme:
  name: material
  language: pt-BR
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.action.edit
    - content.code.copy
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/weather-night
        name: Usar modo escuro
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Usar modo claro

plugins:
  - search:
      lang: pt

markdown_extensions:
  - admonition
  - attr_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

extra_css:
  - docs/assets/stylesheets/extra.css

nav:
  - Início: README.md
  - Começar: docs/COMECAR.md
  - O projeto:
      - Catálogo documental: CATALOGO_DOCUMENTAL.md
      - Framework de referência: FRAMEWORK_DE_REFERENCIA.md
      - Arquitetura documental: ARQ-001_ARQUITETURA_DOCUMENTAL_DO_FRAMEWORK.md
      - Inventário e plano de migração: ARQ-002_INVENTARIO_E_PLANO_DE_MIGRACAO_DOCUMENTAL.md
      - Decisão sobre a estrutura física: ARQ-003_DECISAO_SOBRE_A_ESTRUTURA_FISICA_DO_REPOSITORIO.md
      - Teoria: TEORIA_DO_PRAGMATISMO_CIVICO.md
      - Manifesto: MANIFESTO.md
      - Carta de princípios: CARTA_DE_PRINCIPIOS.md
      - Especificação: SPECIFICATION.md
      - Glossário: GLOSSARIO.md
  - Método:
      - Ciclo do Pragmatismo Cívico: CICLO_DO_PRAGMATISMO_CIVICO.md
      - PPC-000 — Ecossistema PPC: PPC-000_ESPECIFICACAO_DO_ECOSSISTEMA_PPC.md
      - PPC-001 — Diagnóstico: PPC-001_DIAGNOSTICO_DE_PROBLEMAS_PUBLICOS.md
      - PPC-002 — Alternativas: PPC-002_FORMULACAO_E_COMPARACAO_DE_ALTERNATIVAS.md
      - PPC-003 — Avaliação técnica: PPC-003_AVALIACAO_TECNICA_DE_ALTERNATIVAS.md
      - PPC-004 — Decisão e justificativa: PPC-004_DECISAO_E_JUSTIFICATIVA.md
      - Teoria da mudança: MODELO_DE_TEORIA_DA_MUDANCA.md
      - PPC-005 — Implementação: PPC-005_IMPLEMENTACAO_E_GESTAO_ADAPTATIVA.md
      - PPC-006 — Monitoramento: PPC-006_MONITORAMENTO_E_AVALIACAO_CONTINUA.md
      - PPC-007 — Avaliação: PPC-007_AVALIACAO_DE_RESULTADOS_E_IMPACTOS.md
      - PPC-008 — Aprendizagem: PPC-008_APRENDIZAGEM_INSTITUCIONAL_E_MELHORIA_CONTINUA.md
  - Ferramentas:
      - Ficha PPC-001: FICHA_PPC-001_DIAGNOSTICO_DE_PROBLEMA_PUBLICO.md
      - Ficha PPC-002: FICHA_PPC-002_FORMULACAO_E_COMPARACAO_DE_ALTERNATIVAS.md
      - Ficha PPC-003: FICHA_PPC-003_AVALIACAO_TECNICA_DE_ALTERNATIVAS.md
      - Ficha PPC-004: FICHA_PPC-004_DECISAO_E_JUSTIFICATIVA.md
      - Ficha de teoria da mudança: FICHA_TEORIA_DA_MUDANCA.md
      - Ficha PPC-005: FICHA_PPC-005_IMPLEMENTACAO_E_GESTAO_ADAPTATIVA.md
      - Ficha PPC-006: FICHA_PPC-006_MONITORAMENTO_E_AVALIACAO_CONTINUA.md
      - Ficha PPC-007: FICHA_PPC-007_AVALIACAO_DE_RESULTADOS_E_IMPACTOS.md
      - Ficha PPC-008: FICHA_PPC-008_APRENDIZAGEM_INSTITUCIONAL_E_MELHORIA_CONTINUA.md
      - Ficha de proposta de mudança: FICHA_GOV-005_PROPOSTA_DE_MUDANCA.md
      - Registro de revisão e aprovação: FICHA_GOV-006_REGISTRO_DE_REVISAO_E_APROVACAO.md
      - Matriz de avaliação: MATRIZ_DE_AVALIACAO_DE_POLITICAS_PUBLICAS.md
      - Indicadores: INDICADORES.md
  - Governança:
